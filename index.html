    <script>
    // Detect chunk load errors and auto-reload BEFORE React mounts
    window.addEventListener('error', function(e) {
      if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
        if (e.target.href && (e.target.href.includes('/assets/') || e.target.src?.includes('/assets/'))) {
          e.preventDefault();
          console.warn('[SW] Asset load error, reloading for new version');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistration().then(function(reg) { if (reg) reg.unregister(); });
          }
          location.reload();
        }
      }
    }, true);
    </script>
